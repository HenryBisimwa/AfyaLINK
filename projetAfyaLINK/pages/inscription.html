<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AfyaLINK</title>
    <link rel="stylesheet" href="../../src/output.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-blue-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold"><span class="text-green-600">Afya</span><span class="text-blue-700">LINK</span></h1>
            <p class="text-gray-500 mt-2">Créer un compte patient</p>
        </div>

        <div id="message" class="hidden p-3 rounded-lg mb-4 text-sm"></div>

        <form id="inscription-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom complet</label>
                <input type="text" id="nom" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                    placeholder="Jean Mukendi">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                    placeholder="votre@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" id="password" required minlength="4"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                    placeholder="••••••••">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
                <input type="tel" id="telephone"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                    placeholder="+243 900 000 000">
            </div>
            <button type="submit"
                class="w-full py-3 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition">
                S'inscrire
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-600">
            Déjà un compte ?
            <a href="login.html" class="text-green-600 font-bold hover:underline">Se connecter</a>
        </p>

        <a href="../landing.html" class="block text-center mt-4 text-sm text-gray-500 hover:text-green-600">← Retour à l'accueil</a>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="inscription.js"></script>
</body>
</html>
