<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscription - AfyaLink</title>

    <link rel="stylesheet" href="../../src/output.css">

</head>

<body class="min-h-screen bg-gradient-to-br from-green-50 to-blue-50 flex justify-center items-center p-4">

<div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">


    <div class="text-center mb-8">

        <h1 class="text-4xl font-bold">

            <span class="text-green-600">Afya</span><span class="text-blue-700">Link</span>

        </h1>

        <p class="text-gray-500 mt-2">

            Créer un compte

        </p>

    </div>


    <div id="message"
        class="hidden p-3 mb-5 rounded-lg text-center font-medium">

    </div>


    <form id="register-form" class="space-y-4">

        <div>

            <label for="nom"
                class="block mb-1 font-medium text-gray-700">

                Nom complet

            </label>

            <input
                type="text"
                id="nom"
                required
                placeholder="Jean Mukendi"
                class="w-full border rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500">

        </div>

        <div>

            <label for="email"
                class="block mb-1 font-medium text-gray-700">

                Email

            </label>

            <input
                type="email"
                id="email"
                required
                placeholder="votre@email.com"
                class="w-full border rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500">

        </div>

        <div>

            <label for="password"
                class="block mb-1 font-medium text-gray-700">

                Mot de passe

            </label>

            <input
                type="password"
                id="password"
                required
                minlength="4"
                placeholder="********"
                class="w-full border rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500">

        </div>

        <div>

            <label for="confirmPassword"
                class="block mb-1 font-medium text-gray-700">

                Confirmer le mot de passe

            </label>

            <input
                type="password"
                id="confirmPassword"
                required
                minlength="4"
                placeholder="********"
                class="w-full border rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-500">

        </div>

        <button
            type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition">

            Créer un compte

        </button>

    </form>

    <p class="text-center mt-5 text-gray-600">

        Vous avez déjà un compte ?

        <a href="login.html"
            class="text-green-600 font-bold hover:underline">

            Se connecter

        </a>

    </p>

    <div class="text-center mt-5">

        <a href="../landing.html"
            class="hover:text-green-600 hover:underline">

            ← Retour à l'accueil

        </a>

    </div>

</div>

<script src="inscription.js"></script>

</body>

</html>
