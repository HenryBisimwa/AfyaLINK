<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AfyaLink</title>

    <link rel="stylesheet" href="../../src/output.css">
</head>

<body class="min-h-screen bg-gradient-to-br from-green-50 to-blue-50 flex justify-center items-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">


        <div class="text-center mb-6">

            <h1 class="text-3xl font-bold">

                <span class="text-green-600">Afya</span><span class="text-blue-700">Link</span>

            </h1>

            <p class="text-gray-500 mt-2">

                Connectez-vous à votre compte

            </p>

        </div>


        <div id="message"
            class="hidden p-3 mb-5 rounded-lg text-center font-medium">
        </div>


        <form id="login-form" class="space-y-4">

            <div>

                <label for="email"
                    class="block mb-1 font-medium text-gray-700">

                    Email

                </label>

                <input
                    type="email"
                    id="email"
                    autocomplete="email"
                    placeholder="votre@email.com"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none"
                    required>

            </div>

            <div>

                <label for="password"
                    class="block mb-1 font-medium text-gray-700">

                    Mot de passe

                </label>

                <input
                    type="password"
                    id="password"
                    autocomplete="current-password"
                    placeholder="********"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none"
                    required>

            </div>

            <button
                id="loginBtn"
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition">

                Se connecter

            </button>

        </form>


        <p class="text-center mt-5 text-sm text-gray-600">

            Vous n'avez pas de compte ?

            <a href="inscription.html"
                class="text-green-600 font-bold hover:underline">

                S'inscrire

            </a>

        </p>


        <div class="mt-6 bg-gray-100 rounded-lg p-4">

            <h3 class="font-bold mb-2">

                Comptes de démonstration

            </h3>

            <p class="text-gray-600">👤 Patient : patient@test.com / 1234</p>

            <p class="text-gray-600">👨‍⚕️ Médecin : medecin@test.com / 1234</p>

            <p class="text-gray-600">🛠️ Admin : admin@test.com / 1234</p>

        </div>


        <div class="text-center mt-4">

            <a href="../landing.html"
                class="hover:text-green-600 hover:underline">

                ← Retour à l'accueil

            </a>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
